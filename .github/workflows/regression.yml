name: Regression (prod parity + invariants)

# The safety net for the DB/game logic. Two guarantees on every run:
#   1. drift  — every canonical migration function in the repo is live in prod
#               (migration-audit --mode check exits non-zero on drift).
#   2. suite  — the full invariant suite (economy refunds, roster freeze, match
#               immutability, seasons, waitlists, guests, events, reminders,
#               drills, shop, in-league tournaments across seasons) plus a
#               tournament-format sweep, all run against prod as real signed-in
#               users. Any failed invariant exits non-zero.
#
# These write [SIM]-namespaced data to prod and clean up after themselves.
#
# Requires repo secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, SUPABASE_ANON_KEY
on:
  push:
    branches: [master]
    paths:
      - 'supabase/**'
      - 'simulations/**'
      - 'scripts/**'
      - 'mobile/src/lib/tournament.ts'
      - '.github/workflows/regression.yml'
  schedule:
    - cron: '0 8 * * *'   # nightly, 08:00 UTC — daily coverage even without pushes
  workflow_dispatch:

concurrency:
  group: regression-${{ github.ref }}
  cancel-in-progress: true

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

jobs:
  drift:
    name: migration drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # audit picks the canonical file by git history
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: scripts/package-lock.json
      - name: Install (scripts)
        working-directory: scripts
        run: npm ci
      - name: Check prod == repo (function bodies)
        run: node scripts/migration-audit.mjs --mode check

  suite:
    name: invariant suite (vs prod)
    runs-on: ubuntu-latest
    needs: drift            # no point running sims if prod is out of sync
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: simulations/package-lock.json
      - name: Install (simulations)
        working-directory: simulations
        run: npm ci
      - name: Core invariant suite (one process, shared auth)
        working-directory: simulations
        run: npx tsx simulate-flows.ts --scenario suite
      - name: Tournament sweep — single-elim doubles + economy
        working-directory: simulations
        run: npx tsx simulate-flows.ts --scenario tournament --format single_elimination --match-type doubles --team-creation random --users 8 --auto-rounds --economy
      - name: Tournament sweep — double-elim singles
        working-directory: simulations
        run: npx tsx simulate-flows.ts --scenario tournament --format double_elimination --match-type singles --users 8 --auto-rounds
      - name: Tournament sweep — pool play + per-pool playoff
        working-directory: simulations
        run: npx tsx simulate-flows.ts --scenario tournament --format pool_play --match-type singles --pool-count 3 --playoff-format top_2_per_pool --users 9 --auto-rounds --economy
      - name: Final cleanup (always)
        if: always()
        working-directory: simulations
        run: npx tsx simulate-flows.ts --scenario cleanup
