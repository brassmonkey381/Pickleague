name: CI

# Fast, always-on gate: typecheck + unit tests. No secrets, runs on every push
# and PR. This is what must be green before anything merges.
on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: mobile typecheck + vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install (mobile)
        working-directory: mobile
        run: npm ci
      - name: Typecheck
        working-directory: mobile
        run: npx tsc --noEmit
      - name: Unit tests (vitest)
        working-directory: mobile
        run: npm test
