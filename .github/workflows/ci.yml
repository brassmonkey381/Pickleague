name: CI

# Fast, always-on gate: typecheck + unit tests. No secrets, runs on every push
# and PR. This is what must be green before anything merges.
on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: mobile typecheck + vitest
    runs-on: ubuntu-latest
    # Lets the built-in GITHUB_TOKEN read the (public) foundation package.
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install (mobile)
        working-directory: mobile
        # The foundation is a GitHub Packages dep; mobile/.npmrc references
        # ${GITHUB_TOKEN} for registry auth. While the package is PUBLIC, the
        # built-in Actions token (with packages:read above) can read it even
        # cross-org. If it's ever made private, swap this for a read:packages
        # PAT stored as a repo secret (e.g. secrets.PACKAGES_TOKEN).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci
      - name: Typecheck
        working-directory: mobile
        run: npx tsc --noEmit
      - name: Unit tests (vitest)
        working-directory: mobile
        run: npm test
