name: CI

# Fast, always-on gate: typecheck + unit tests. No secrets, runs on every push
# and PR. This is what must be green before anything merges.
on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: mobile typecheck + vitest
    runs-on: ubuntu-latest
    # Lets the built-in GITHUB_TOKEN read the (public) foundation package.
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install (mobile)
        working-directory: mobile
        # The foundation is a GitHub Packages dep in another org
        # (just-messin-around). GitHub Packages requires auth even for public
        # packages, and the built-in Actions token can't read cross-org — so
        # mobile/.npmrc's ${GITHUB_TOKEN} is fed a read:packages PAT stored as
        # the PACKAGES_TOKEN repo secret.
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: npm ci
      - name: Typecheck
        working-directory: mobile
        run: npx tsc --noEmit
      - name: Unit tests (vitest)
        working-directory: mobile
        run: npm test
