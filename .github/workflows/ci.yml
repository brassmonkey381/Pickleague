name: CI

# Fast, always-on gate: typecheck + unit tests. No secrets, runs on every push
# and PR. This is what must be green before anything merges.
on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: mobile typecheck + vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install (mobile)
        working-directory: mobile
        # The foundation is a private GitHub Packages dep in another org
        # (just-messin-around), so the repo's automatic token can't read it —
        # PACKAGES_TOKEN is a read:packages PAT stored as a repo secret. The
        # mobile/.npmrc references ${GITHUB_TOKEN} for the registry auth.
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: npm ci
      - name: Typecheck
        working-directory: mobile
        run: npx tsc --noEmit
      - name: Unit tests (vitest)
        working-directory: mobile
        run: npm test
