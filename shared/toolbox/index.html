<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{TITLE}}</title>
<style>
  :root {
    --bg:#0f1722; --panel:#16212e; --panel2:#1d2a39; --border:#2a3b4d;
    --text:#e6eef6; --sub:#9fb3c7; --accent:#2e7cd6; --accent2:#2e9e5b; --danger:#d9463e; --warn:#e0a93e;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--text); }
  header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  header h1 { font-size:18px; margin:0; }
  header .dot { width:10px; height:10px; border-radius:50%; background:var(--accent2); box-shadow:0 0 8px var(--accent2); }
  .wrap { display:flex; min-height:calc(100vh - 53px); }
  nav { width:210px; border-right:1px solid var(--border); padding:12px; background:var(--panel); }
  nav button { display:block; width:100%; text-align:left; padding:10px 12px; margin-bottom:6px; border:0; border-radius:8px;
    background:transparent; color:var(--sub); font-size:14px; cursor:pointer; }
  nav button:hover { background:var(--panel2); color:var(--text); }
  nav button.active { background:var(--accent); color:#fff; }
  main { flex:1; padding:22px 26px; max-width:880px; }
  h2 { margin:0 0 4px; font-size:20px; }
  .desc { color:var(--sub); font-size:13px; margin:0 0 18px; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:13px; font-weight:600; margin-bottom:5px; }
  .field .help { color:var(--sub); font-weight:400; font-size:12px; margin-left:6px; }
  input[type=text],input[type=number],input[type=password],select {
    width:100%; padding:9px 11px; border:1px solid var(--border); border-radius:8px; background:var(--panel2); color:var(--text); font-size:14px; }
  .check { display:flex; align-items:center; gap:8px; }
  .check input { width:16px; height:16px; }
  .check label { margin:0; }
  .btns { display:flex; gap:10px; align-items:center; margin:16px 0 10px; flex-wrap:wrap; }
  button.action { padding:9px 16px; border:0; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; color:#fff; }
  .run { background:var(--accent); } .run:hover { filter:brightness(1.1); }
  .install { background:var(--panel2); border:1px solid var(--border)!important; color:var(--text); }
  .stop { background:var(--danger); } .save { background:var(--accent2); }
  button.action:disabled { opacity:.5; cursor:default; }
  .status { font-size:13px; color:var(--sub); }
  pre.console { background:#0a1019; border:1px solid var(--border); border-radius:10px; padding:14px; min-height:220px; max-height:48vh;
    overflow:auto; white-space:pre-wrap; word-break:break-word; font:12.5px/1.5 ui-monospace,Menlo,Consolas,monospace; color:#cfe3f5; }
  .hidden { display:none; }
</style>
</head>
<body>
<header><span class="dot"></span><h1 id="title">Toolbox</h1><span class="status" id="hdrstatus"></span></header>
<div class="wrap">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>
<script>
let META = { title:'Toolbox', keys: [], tools: [] };
let CONFIG = {};
let activeRun = null;

const el = (tag, props={}, ...kids) => {
  const n = document.createElement(tag);
  for (const [k,v] of Object.entries(props)) {
    if (k === 'class') n.className = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), v);
    else n.setAttribute(k, v);
  }
  for (const kid of kids) if (kid != null) n.append(kid);
  return n;
};

// ---- config-driven key extraction from a text file ----
function b64urlDecode(s) { try { return atob(s.replace(/-/g, '+').replace(/_/g, '/').padEnd(Math.ceil(s.length / 4) * 4, '=')); } catch { return ''; } }
function isJwt(v) { return /^eyJ[\w-]+\.[\w-]+\.[\w-]+$/.test(v); }
function jwtRole(v) { try { return JSON.parse(b64urlDecode(v.split('.')[1])).role || null; } catch { return null; } }
const norm = (s) => String(s).toLowerCase().replace(/[^a-z0-9]+/g, '');
const reEsc = (s) => String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
// A key's `match` spec is declarative + serializable: { prefix, regex, flags, jwtRole, pathEndsWith }
function shapeMatch(m, v) {
  if (!m) return false; let any = false;
  if (m.prefix) { any = true; if (!v.startsWith(m.prefix)) return false; }
  if (m.regex) { any = true; try { if (!new RegExp(m.regex, m.flags || '').test(v)) return false; } catch { return false; } }
  if (m.jwtRole) { any = true; if (!isJwt(v) || jwtRole(v) !== m.jwtRole) return false; }
  if (m.pathEndsWith) { any = true; if (!new RegExp('[\\/\\\\].*' + reEsc(m.pathEndsWith) + '(\\.exe)?$', 'i').test(v)) return false; }
  return any;
}
function parseKeysFromText(text, keys, current) {
  const pairs = [];
  const lineRe = /^(?:export\s+|set\s+)?["']?([A-Za-z0-9_.\- ]+?)["']?\s*[:=]>?\s*["']?(.+?)["']?\s*$/;
  for (const ln of text.split(/\r?\n/)) { const m = ln.match(lineRe); if (m) pairs.push({ k: m[1].trim(), v: m[2].trim() }); }
  const tokens = text.split(/[\s"',;]+/).map((s) => s.trim()).filter(Boolean);
  const out = {}, used = new Set();
  for (const key of keys) {
    if (current[key.name]) continue; // only fill unassigned
    const want = new Set([norm(key.name), ...((key.aliases || []).map(norm))]);
    let hit = pairs.find((p) => want.has(norm(p.k)) && !used.has(p.v));                              // exact / alias name
    if (!hit) hit = pairs.find((p) => [...want].some((a) => norm(p.k).includes(a)) && !used.has(p.v)); // fuzzy: label contains
    if (!hit && key.match) { const t = tokens.find((v) => !used.has(v) && shapeMatch(key.match, v)); if (t) hit = { v: t }; } // value shape
    if (hit) { out[key.name] = hit.v; used.add(hit.v); }
  }
  return out;
}

async function load() {
  META = await (await fetch('/api/meta')).json();
  CONFIG = await (await fetch('/api/config')).json();
  document.getElementById('title').textContent = META.title || 'Toolbox';
  renderNav();
  selectTab('keys');
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  nav.append(el('button', { id:'tab-keys', onclick:()=>selectTab('keys') }, '🔑 Keys'));
  for (const t of META.tools) nav.append(el('button', { id:'tab-'+t.id, onclick:()=>selectTab(t.id) }, '🛠 ' + t.label));
}

function selectTab(id) {
  if (activeRun) { activeRun.abort(); activeRun = null; }
  document.querySelectorAll('#nav button').forEach((b) => b.classList.remove('active'));
  document.getElementById('tab-'+id)?.classList.add('active');
  const main = document.getElementById('main');
  main.innerHTML = '';
  if (id === 'keys') main.append(renderKeys());
  else main.append(renderTool(META.tools.find((t) => t.id === id)));
}

function renderKeys() {
  const box = el('div');
  box.append(el('h2', {}, 'Keys & secrets'));
  box.append(el('p', { class:'desc' }, 'Stored locally in the secrets file (gitignored) and injected as env vars when a tool runs.'));
  const inputs = {};
  for (const k of META.keys) {
    const inp = el('input', { type:'password', value: CONFIG[k.name] || '', placeholder: k.hint || '' });
    inputs[k.name] = inp;
    const show = el('label', { class:'help', style:'cursor:pointer' }, ' show');
    show.addEventListener('click', () => { inp.type = inp.type === 'password' ? 'text' : 'password'; });
    box.append(el('div', { class:'field' }, el('label', {}, k.label, el('span',{class:'help'},k.hint||''), show), inp));
  }
  const status = el('span', { class:'status' });
  const save = el('button', { class:'action save', onclick: async () => {
    const body = {}; for (const [n,inp] of Object.entries(inputs)) body[n] = inp.value.trim();
    await fetch('/api/config', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    CONFIG = { ...CONFIG, ...body }; status.textContent = 'Saved ✓'; setTimeout(()=>status.textContent='', 2000);
  }}, 'Save keys');

  const fileInput = el('input', { type:'file', accept:'.txt,.env,text/plain', style:'display:none' });
  const parseBtn = el('button', { class:'action install', onclick:()=>fileInput.click() }, '📄 Parse keys from file');
  fileInput.addEventListener('change', async () => {
    const file = fileInput.files?.[0]; if (!file) return;
    const text = await file.text();
    const current = {}; for (const [n,inp] of Object.entries(inputs)) current[n] = inp.value.trim();
    const matched = parseKeysFromText(text, META.keys, current);
    let n = 0;
    for (const [name,val] of Object.entries(matched)) { inputs[name].value = val; inputs[name].style.borderColor = 'var(--accent2)'; n++; }
    const stillEmpty = META.keys.filter((k) => !current[k.name] && !matched[k.name]).map((k) => k.name);
    status.textContent = n
      ? `Filled ${n} key(s) from ${file.name}${stillEmpty.length ? ' · still empty: ' + stillEmpty.join(', ') : ''} — review & Save.`
      : `No new keys matched in ${file.name}.`;
    fileInput.value = '';
  });
  box.append(el('div', { class:'btns' }, parseBtn, save, status), fileInput);
  return box;
}

function renderTool(t) {
  const box = el('div');
  box.append(el('h2', {}, t.label));
  box.append(el('p', { class:'desc' }, t.description || ''));
  const inputs = {};
  const wrappers = {};
  // A select's `options` may be a static array, or dynamic:
  //   { __by: 'fieldName' | ['f1','f2'], map: { 'v'|'v1|v2': [opts] }, default: [opts] }
  // The option list is recomputed from the controlling field(s) whenever they
  // change. `showIf: { fieldName: [values] }` hides a field until every listed
  // controller holds an allowed value.
  const optionListFor = (f) => {
    if (Array.isArray(f.options)) return f.options;
    if (f.options && f.options.__by) {
      const by = Array.isArray(f.options.__by) ? f.options.__by : [f.options.__by];
      const key = by.map((n) => (inputs[n] ? inputs[n].value : '')).join('|');
      return f.options.map[key] || f.options.default || [];
    }
    return [];
  };
  for (const f of t.fields || []) {
    let inp, wrap;
    if (f.type === 'checkbox') {
      inp = el('input', { type:'checkbox' }); if (f.default) inp.checked = true;
      wrap = el('div', { class:'field check' }, inp, el('label', {}, (f.flag||f.name).replace(/^--/,''), f.help ? el('span',{class:'help'},f.help) : null));
    } else if (f.type === 'select') {
      inp = el('select'); // options populated by applyDynamics() below
      wrap = el('div', { class:'field' }, el('label', {}, f.name, f.help?el('span',{class:'help'},f.help):null), inp);
    } else if (f.type === 'file') {
      inp = el('input', { type:'file' }); if (f.accept) inp.setAttribute('accept', f.accept);
      wrap = el('div', { class:'field' }, el('label', {}, f.name, f.help?el('span',{class:'help'},f.help):null), inp);
    } else {
      inp = el('input', { type: f.type==='number'?'number':'text', placeholder: f.placeholder || '' });
      if (f.default != null) inp.value = f.default;
      wrap = el('div', { class:'field' }, el('label', {}, f.name, f.help?el('span',{class:'help'},f.help):null), inp);
    }
    inputs[f.name] = inp; wrappers[f.name] = wrap;
    box.append(wrap);
  }

  const isVisible = (f) => wrappers[f.name].style.display !== 'none';
  function applyDynamics() {
    for (const f of t.fields || []) {
      if (f.type === 'select') {
        const opts = optionListFor(f);
        const prev = inputs[f.name].value;
        const want = opts.includes(prev) ? prev : (opts.includes(f.default) ? f.default : opts[0]);
        // Rebuild only when the set changed, to preserve the selection otherwise.
        const cur = Array.from(inputs[f.name].options).map((o) => o.value);
        if (cur.join('') !== opts.join('')) {
          inputs[f.name].textContent = '';
          for (const o of opts) { const op = el('option', { value:o }, o); if (o===want) op.selected = true; inputs[f.name].append(op); }
        }
        if (inputs[f.name].value !== want) inputs[f.name].value = want;
      }
      if (f.showIf) {
        const ok = Object.entries(f.showIf).every(([ctrl, allowed]) => inputs[ctrl] && allowed.includes(inputs[ctrl].value));
        wrappers[f.name].style.display = ok ? '' : 'none';
      }
    }
  }
  for (const f of t.fields || []) {
    if (f.type === 'select') inputs[f.name].addEventListener('change', applyDynamics);
  }
  applyDynamics();

  const consoleEl = el('pre', { class:'console' });
  const runBtn = el('button', { class:'action run' }, 'Run');
  const stopBtn = el('button', { class:'action stop hidden' }, 'Stop');
  const installBtn = t.needsInstall ? el('button', { class:'action install' }, 'Install deps') : null;
  const note = el('span', { class:'status' });

  const readFileAsBase64 = (file) => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(String(r.result).split(',')[1] || '');
    r.onerror = () => rej(r.error);
    r.readAsDataURL(file);
  });
  const collectArgs = async () => {
    const a = {};
    for (const f of t.fields || []) {
      // Hidden (showIf false) → send an empty value so the flag is omitted and
      // the script falls back to its own default for that inapplicable option.
      if (!isVisible(f)) { a[f.name] = f.type === 'checkbox' ? false : ''; continue; }
      if (f.type === 'checkbox') { a[f.name] = inputs[f.name].checked; continue; }
      if (f.type === 'file') {
        const file = inputs[f.name].files?.[0];
        a[f.name] = file ? { __file: true, filename: file.name, dataBase64: await readFileAsBase64(file) } : '';
        continue;
      }
      a[f.name] = inputs[f.name].value;
    }
    return a;
  };

  async function start(action) {
    const missing = META.keys.filter((k) => !CONFIG[k.name]).map((k) => k.name);
    note.textContent = action === 'run' && missing.length ? 'Heads-up: empty keys — ' + missing.join(', ') : '';
    const args = await collectArgs();
    const hasDryRun = (t.fields || []).some((f) => f.name === 'dry-run');
    if (action === 'run' && hasDryRun && !args['dry-run']) {
      if (!confirm('Dry-run is OFF — this run will WRITE changes. Continue?')) return;
    }
    activeRun = new AbortController();
    runBtn.disabled = true; if (installBtn) installBtn.disabled = true; stopBtn.classList.remove('hidden');
    consoleEl.textContent = '';
    try {
      const resp = await fetch('/api/run', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ toolId: t.id, action, args }), signal: activeRun.signal });
      const reader = resp.body.getReader(); const dec = new TextDecoder();
      for (;;) { const { done, value } = await reader.read(); if (done) break; consoleEl.textContent += dec.decode(value, { stream:true }); consoleEl.scrollTop = consoleEl.scrollHeight; }
    } catch (e) {
      consoleEl.textContent += e.name === 'AbortError' ? '\n[stopped]' : '\n[client error: ' + e.message + ']';
    } finally {
      activeRun = null; runBtn.disabled = false; if (installBtn) installBtn.disabled = false; stopBtn.classList.add('hidden');
    }
  }

  runBtn.addEventListener('click', () => start('run'));
  if (installBtn) installBtn.addEventListener('click', () => start('install'));
  stopBtn.addEventListener('click', () => { if (activeRun) activeRun.abort(); });

  const btns = el('div', { class:'btns' });
  if (installBtn) btns.append(installBtn);
  btns.append(runBtn, stopBtn, note);
  box.append(btns, consoleEl);
  return box;
}

load();
</script>
</body>
</html>
